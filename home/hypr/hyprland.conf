# =============================================================================
#  Hyprland — Matrix rice (medium intensity)
#  Built for Hyprland 0.55.x — new section syntax.
# =============================================================================

# ── Autostart ──────────────────────────────────────────────────────────────
exec-once = dbus-update-activation-environment --systemd --wayland
exec-once = systemd --user &
exec-once = /run/current-system/sw/share/polkit-gnome/polkit-gnome-authentication-agent-1
exec-once = swww-daemon &
exec-once = swww img ~/.local/share/wallpapers/matrix-crt.png --transition-type grow --transition-duration 1
# AGS is the primary bar — autostarted by the systemd user service (see home/wayland-apps.nix)
# exec-once = ags run /home/ben/.config/ags
# Waybar is the backup; uncomment to swap:
# exec-once = waybar &

# ── Env ───────────────────────────────────────────────────────────────────
env = XCURSOR_THEME,Bibata-Modern-Dark
env = XCURSOR_SIZE,24
env = HYPRCURSOR_SIZE,24

# ── Monitor ───────────────────────────────────────────────────────────────
monitor=,preferred,auto,1.5

# ── General ───────────────────────────────────────────────────────────────
general {
    gaps_in = 6
    gaps_out = 14
    border_size = 3
    col.active_border = rgba(65cc66ff) rgba(2a8a44ff) 45deg
    col.inactive_border = rgba(1f2a1fff)
    layout = dwindle
    allow_tearing = false

    # screensharing (xdg-desktop-portal-hyprland)
    misc.vfr = true
}

# ── Decoration ────────────────────────────────────────────────────────────
decoration {
    rounding = 12
    blur {
        enabled = true
        size = 8
        passes = 3
        noise = 0.02
        contrast = 0.8915
        brightness = 0.8172
    }
    shadow {
        enabled = true
        range = 12
        render_power = 3
        color = rgba(000000aa)
    }
    dim_inactive = false
    dim_strength = 0.2
    active_opacity = 0.95
    inactive_opacity = 0.85
    fullscreen_opacity = 1.0
}

# ── Animations ────────────────────────────────────────────────────────────
animations {
    enabled = yes
    bezier = easeOut, 0.2, 0.6, 0.4, 1
    animation = windows, 1, 4, easeOut, slide
    animation = fade, 1, 5, easeOut
    animation = workspaces, 1, 4, easeOut, slide
}

# ── Dwindle ───────────────────────────────────────────────────────────────
dwindle {
    pseudotile = true
    preserve_split = true
    no_gaps_when_only = false
    special_scale_factor = 0.8
    split_width_multiplier = 1.0
    auto_split = true
}

# ── Master ────────────────────────────────────────────────────────────────
master {
    new_status = master
    new_on_top = true
    mfact = 0.55
}

# ── Input ─────────────────────────────────────────────────────────────────
input {
    kb_layout = us
    kb_variant =
    kb_options =
    follow_mouse = 1
    touchpad {
        natural_scroll = yes
        clickfinger_behavior = yes
    }
    sensitivity = 0
    accel_profile = flat
    numlock_by_default = true
}

# ── Gestures ──────────────────────────────────────────────────────────────
gestures {
    workspace_swipe = true
}

# ── Misc ──────────────────────────────────────────────────────────────────
misc {
    disable_autoreload = false
    enable_anr_dialog = true
    animate_manual_resize = true
    animate_mouse_windowdragging = true
}

# ── XWayland ──────────────────────────────────────────────────────────────
xwayland {
    enabled = true
    use_nearest_neighbor = false
    force_zero_scaling = false
}

# ── Binds ─────────────────────────────────────────────────────────────────
$mainMod = SUPER
$terminal = kitty
$browser = zen-browser
$launcher = walker
$fileManager = thunar
# Note: walker is a unified launcher — no separate menu/power subcommands.
# Power menu is via wlogout (installed via home.packages) or systemd poweroff.

# Programmatic (uses `binde` — the `e` is critical in 0.55.x)
binde = $mainMod, Return, exec, $terminal
binde = $mainMod, B, exec, $browser
binde = $mainMod, D, exec, $launcher
binde = $mainMod, E, exec, $fileManager
binde = $mainMod Escape, exec, hyprlock
binde = $mainMod, Q, killactive,
binde = $mainMod, F, fullscreen,
binde = $mainMod, Space, togglefloating,
binde = $mainMod, V, togglefloating,
binde = $mainMod, J, togglesplit,
binde = $mainMod SHIFT, E, exec, wlogout
binde = $mainMod CTRL, R, exec, hyprctl reload
binde = $mainMod, P, exec, pkill -9 wlogout || wlogout

binde = , Print, exec, grim -g "$(slurp)" - | satty --filename - --output-filename ~/Pictures/screenshot-$(date +%Y%m%d-%H%M%S).png
binde = $mainMod SHIFT, S, exec, grim - | wl-copy
binde = $mainMod SHIFT, V, exec, wl-paste | xargs -I{} imv {}

# Move focus
binde = $mainMod, left,  movefocus, l
binde = $mainMod, right, movefocus, r
binde = $mainMod, up,    movefocus, u
binde = $mainMod, down,  movefocus, d

# Move window
binde = $mainMod SHIFT, left,  movewindow, l
binde = $mainMod SHIFT, right, movewindow, r
binde = $mainMod SHIFT, up,    movewindow, u
binde = $mainMod SHIFT, down,  movewindow, d

# Resize
binde = $mainMod CTRL, left,  resizeactive, -40 0
binde = $mainMod CTRL, right, resizeactive, 40 0
binde = $mainMod CTRL, up,    resizeactive, 0 -40
binde = $mainMod CTRL, down,  resizeactive, 0 40

# Workspace bindings
binde = $mainMod, 1, workspace, 1
binde = $mainMod, 2, workspace, 2
binde = $mainMod, 3, workspace, 3
binde = $mainMod, 4, workspace, 4
binde = $mainMod, 5, workspace, 5
binde = $mainMod, 6, workspace, 6
binde = $mainMod, 7, workspace, 7
binde = $mainMod, 8, workspace, 8
binde = $mainMod, 9, workspace, 9

# Move to workspace
binde = $mainMod SHIFT, 1, movetoworkspace, 1
binde = $mainMod SHIFT, 2, movetoworkspace, 2
binde = $mainMod SHIFT, 3, movetoworkspace, 3
binde = $mainMod SHIFT, 4, movetoworkspace, 4
binde = $mainMod SHIFT, 5, movetoworkspace, 5
binde = $mainMod SHIFT, 6, movetoworkspace, 6
binde = $mainMod SHIFT, 7, movetoworkspace, 7
binde = $mainMod SHIFT, 8, movetoworkspace, 8
binde = $mainMod SHIFT, 9, movetoworkspace, 9

# Special workspace (scratchpad)
binde = $mainMod, S, togglespecialworkspace, magic
binde = $mainMod SHIFT, S, movetoworkspace, special:magic

# Mouse
binde = $mainMod, mouse:272, movewindow
binde = $mainMod, mouse:273, resizewindow

# Workspace rules
workspace = 1, monitor:preferred, default:false, onworkspaceempty:false
workspace = 2, monitor:preferred, default:false, onworkspaceempty:false
workspace = 3, monitor:preferred, default:false, onworkspaceempty:false
workspace = 4, monitor:preferred, default:false, onworkspaceempty:false
workspace = 5, monitor:preferred, default:false, onworkspaceempty:false
workspace = 6, monitor:preferred, default:false, onworkspaceempty:false
workspace = 7, monitor:preferred, default:false, onworkspaceempty:false
workspace = 8, monitor:preferred, default:false, onworkspaceempty:false
workspace = 9, monitor:preferred, default:false, onworkspaceempty:false

# Window rules (windowrulev2)
windowrulev2 = opacity 0.9 0.95,       class:.*
windowrulev2 = opacity 1.0,            floating
windowrulev2 = opacity 1.0,            fullscreen
windowrulev2 = noborder,               floating
windowrulev2 = noborder,               fullscreen
windowrulev2 = nofocus,                class:^$, title:^$

# Layer rules
layerrule = blur, hyprbars
layerrule = ignorealpha 0.5, waybar
layerrule = ignorealpha 0.5, ags
layerrule = noanim, swaync

# Window opacity per class
windowrulev2 = opacity 0.95 0.9,    class:^(kitty)$
windowrulev2 = opacity 0.95 0.9,    class:^(zen-browser)$
windowrulev2 = opacity 0.92 0.9,    class:^(thunar)$
windowrulev2 = opacity 0.95 0.9,    class:^(thunderbird)$
windowrulev2 = opacity 0.92 0.9,    class:^(zathura)$
windowrulev2 = opacity 0.92 0.9,    class:^(imv)$
windowrulev2 = opacity 0.95 0.9,    class:^(mpv)$

# Float some apps by default
windowrulev2 = float,                class:^(zen-browser)$, title:^Picture-in-Picture$
windowrulev2 = size 640 360,          class:^(zen-browser)$, title:^Picture-in-Picture$
windowrulev2 = float,                class:^(thunar)$, title:^(Open Files)$
windowrulev2 = float,                class:^(imv)$
windowrulev2 = float,                class:^(mpv)$
windowrulev2 = float,                class:^(pavucontrol)$
windowrulev2 = float,                class:^(nm-connection-editor)$
windowrulev2 = float,                class:^(blueman-manager)$
windowrulev2 = float,                class:^(wlopm)$
windowrulev2 = float,                class:^(swaync-notification-window)$
windowrulev2 = float,                class:^(walker)$
windowrulev2 = float,                title:^(Walker)$

# Open apps on specific workspaces
windowrulev2 = workspace 2,           class:^(kitty)$
windowrulev2 = workspace 3,           class:^(zen-browser)$
windowrulev2 = workspace 4,           class:^(thunderbird)$
windowrulev2 = workspace 5,           class:^(thunar)$
windowrulev2 = workspace 8,           class:^(mpv)$
windowrulev2 = workspace 9,           class:^(zathura)$

# Pill-shaped terminal
windowrulev2 = rounding 16,           class:^(kitty)$

# env vars for specific apps
windowrulev2 = env XDG_CURRENT_DESKTOP, swaync,    class:^(swaync)$
windowrulev2 = env XDG_CURRENT_DESKTOP, swaync,    class:^(swaync-notification-window)$