# =============================================================================
#  hyprlock — Matrix-themed lock screen
# =============================================================================

general {
    hide_cursor = true
    grace = 0
    no_fade_in = false
    fade_in = 300
    no_fade_out = false
    fade_out = 200
    allow_underline = false
    reload_time = -1
    retry_time = 250

    # Disable any built-in backgrounds — we draw our own
    skip_success_screen = false
    fail_color = rgba(cc4154ff)
}

# ── Background: blurred wallpaper + dim overlay ──────────────────────────
background {
    monitor =
    path = screenshot      # capture current screen and blur it
    blur_passes = 5
    blur_size = 12
    noise = 0.0117
    contrast = 0.8915
    brightness = 0.4
    vibrancy = 0.1696
    vibrancy_darkness = 0.0
}

# Optional solid layer over the blurred wallpaper
layer {
    monitor =
    # Phosphor green outline for the box
    hyprcursor = false
    shape = circle
    color = rgba(0d140dd0)

    border_size = 4
    border_color = rgba(41cc66ff)

    rotate = 0
    roundsize = 50
    halign = center
    valign = center
}

# ── Box around input field ────────────────────────────────────────────────
input-field {
    monitor =
    size = 380, 60
    outline_thickness = 2
    dots_size = 0.25
    dots_spacing = 0.15
    dots_center = true
    dots_rounding = -1

    placeholder_text = <i>Input Password...</i>
    fail_text = <i>Wrong password</i>
    hide_input = false
    transform_position = 0, -120

    placeholder_color = rgba(8a918cff)
    fail_color = rgba(cc4154ff)
    background_color = rgba(161b16ee)
    cursor_color = rgba(41cc66ff)
    cursor_outline_color = rgba(41cc66ff)

    # Phosphor border
    outline_color = rgba(41cc66ff)
    # Inner color (subtle)
    inner_color = rgba(161b16ff)

    font_family = JetBrainsMono Nerd Font
    font_size = 18
    font_weight = normal

    # Round corners
    rounding = 8

    fail_outline_color = rgba(cc4154ff)
    fail_background_color = rgba(161b16ee)
    fail_message = <i>$ATTEMPTS attempts left</i>
    position = 0, -120
    halign = center
    valign = center
}

# ── Big time + date label ─────────────────────────────────────────────────
label {
    monitor =
    text = $TIME
    color = rgba(41cc66ff)
    font_size = 64
    font_family = JetBrainsMono Nerd Font
    font_weight = bold
    position = 0, 100
    halign = center
    valign = center
    transform = with-region
    shadow_size = 4
    shadow_color = rgba(000000aa)
    shadow_passes = 2
    outline_thickness = 0
}

label {
    monitor =
    text = $TIME
    color = rgba(5fe07aff)
    font_size = 18
    font_family = JetBrainsMono Nerd Font
    font_weight = normal
    position = 0, -160
    halign = center
    valign = center
}

label {
    monitor =
    text = Hi, Ben
    color = rgba(cfd4cfff)
    font_size = 14
    font_family = JetBrainsMono Nerd Font
    font_weight = normal
    position = 0, 160
    halign = center
    valign = center
}