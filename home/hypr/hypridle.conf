# =============================================================================
#  hypridle — Matrix-themed idle manager
#  Replaces logind's IdleAction (which we set to ignore in power.nix).
# =============================================================================

general {
    lock_cmd = pidof hyprlock || hyprlock
    before_sleep_cmd = loginctl lock-session
    after_sleep_cmd = hyprctl dispatch dpms on

    # Don't deal with lid — logind does
    ignore_dbus_inhibit = false
}

# ── DPMS off after 300s (5 min) ───────────────────────────────────────────
listener {
    timeout = 300
    on-timeout = hyprctl dispatch dpms off
    on-resume = hyprctl dispatch dpms on
}

# ── Lock before suspend after 600s (10 min) ───────────────────────────────
listener {
    timeout = 600
    on-timeout = loginctl suspend
}

# ── Resume on activity ────────────────────────────────────────────────────
listener {
    timeout = 120
    on-timeout = brightnessctl -sd '*' set 30
    on-resume = brightnessctl -r
}

