# =============================================================================
#  kitty.conf — Matrix terminal
# =============================================================================

# ── Font ──────────────────────────────────────────────────────────────────
font_family      JetBrainsMono Nerd Font
bold_font        JetBrainsMono Nerd Font Bold
italic_font      JetBrainsMono Nerd Font Italic
bold_italic_font JetBrainsMono Nerd Font Bold Italic
font_size        12.0
line_height      1.3
adjust_line_height 0
font_features    none

# ── Cursor ────────────────────────────────────────────────────────────────
cursor_shape        block
cursor_beam_thickness 1.5
cursor_underline_thickness 2.0
cursor_blink_interval 0
cursor_stop_blinking_after 2.0

# ── Scrollback ────────────────────────────────────────────────────────────
scrollback_lines 10000
scrollback_pager_history_size 100
scrollback_indicator_opacity 0.6

# ── Mouse ─────────────────────────────────────────────────────────────────
mouse_hide_wait 3.0
url_color #41cc66
url_style curly
open_url_with default
url_prefixes http https file ftp gemini irc gopher news mailto

# ── Performance ───────────────────────────────────────────────────────────
repaint_delay 5
input_delay 3
sync_to_monitor yes

# ── Window layout ─────────────────────────────────────────────────────────
remember_window_size yes
initial_window_width  1100
initial_window_height 700
window_padding_width 12
single_window_padding_width 8
window_margin_width 0
window_resize_step_cells 2
window_resize_step_lines 2
window_border_width 0
draw_minimal_borders no
resize_in_steps no

# ── Tabs ──────────────────────────────────────────────────────────────────
tab_bar_edge bottom
tab_bar_style powerline
tab_powerline_style angled
tab_title_template {f'{index} — {title}'}
active_tab_font_style bold
inactive_tab_font_style normal
tab_bar_background #0d140d
tab_bar_margin_color #0d140d

# ── Background opacity ────────────────────────────────────────────────────
background_opacity 0.92
background_blur 8
dynamic_background_opacity yes

# ── Bell ──────────────────────────────────────────────────────────────────
enable_audio_bell no
visual_bell_duration 0.05
bell_on_tab yes
command_on_bell none

# ── Misc ──────────────────────────────────────────────────────────────────
allow_hyperlinks yes
term xterm-256color
update_check_interval 0
strip_trailing_spaces smart
include ./theme.conf

# ── Advanced ──────────────────────────────────────────────────────────────
# Allow wider box-drawing on HiDPI
box_drawing_scale 0.001
# Reduce cursor shake on sub-pixel scroll
wheel_scroll_multiplier 1.0
# Keybindings
map ctrl+shift+1 launch --location=vsplit
map ctrl+shift+2 launch --location=hsplit
map ctrl+shift+5 launch --location=split
map ctrl+shift+8 launch --location=osplit
map ctrl+shift+enter launch --cwd=current
map ctrl+shift+t launch --type=tab
map ctrl+shift+q close
map ctrl+shift+l next_layout
map ctrl+shift+w close
map ctrl+tab next_window
map ctrl+shift+tab previous_window
map ctrl+alt+1 move_window_to_screen 1
map ctrl+alt+2 move_window_to_screen 2