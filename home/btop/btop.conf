# ── btop.conf — Matrix theme (phosphor green, medium intensity) ──────────
# Plain key=value format. See `btop --help-config` for all fields.

# ── General ───────────────────────────────────────────────────────────────
color_theme = "default"
theme_background = False
truecolor = True
mouse = True
click_to_focus = True
follow_mouse = True
show_battery = True
show_cpu_temp = True
show_network = True
show_mem_swap = True
proc_left = False
proc_per_core = False

# ── Update intervals ──────────────────────────────────────────────────────
update_ms = 2000
net_delay = 500
cpu_drawing_method = "─"
drawing_spacing = 1

# ── Theme overrides (key=value) ──────────────────────────────────────────
theme[main_bg]        = "#0d140d"
theme[main_fg]        = "#cfd4cf"
theme[title]          = "#5fe07a"
theme[title_bg]       = "#161b16"
theme[hi_fg]          = "#0d140d"
theme[hi_bg]          = "#41cc66"
theme[selected_bg]    = "#2a8a44"
theme[selected_fg]    = "#0d140d"
theme[inactive_fg]    = "#8a918c"
theme[cpu_box]        = "#41cc66"
theme[mem_box]        = "#41cc66"
theme[net_box]        = "#41cc66"
theme[proc_box]       = "#41cc66"
theme[div_line]       = "#1f2a1f"
theme[meter_bg]       = "#161b16"
theme[proc_start]     = "#2a8a44"
theme[proc_end]       = "#5fe07a"
theme[cpu_start]      = "#2a8a44"
theme[cpu_end]        = "#5fe07a"
theme[mem_start]      = "#2a8a44"
theme[mem_end]        = "#5fe07a"
theme[net_start]      = "#2a8a44"
theme[net_end]        = "#5fe07a"
theme[theme_bg]       = "#0d140d"